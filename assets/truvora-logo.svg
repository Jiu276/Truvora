<svg width="140" height="45" viewBox="0 0 140 45" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon/Symbol with enhanced design -->
  <rect x="2" y="9" width="28" height="28" rx="8" fill="url(#logoGradient)" filter="url(#glow)"/>
  
  <!-- Central checkmark symbol -->
  <path d="M10 23 L15 27 L22 17" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Small rating stars -->
  <circle cx="12" cy="15" r="1" fill="white" opacity="0.8"/>
  <circle cx="16" cy="15" r="1" fill="white" opacity="0.8"/>
  <circle cx="20" cy="15" r="1" fill="white" opacity="0.8"/>
  
  <!-- Text "Truvora" -->
  <text x="36" y="26" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#333">
    Truvora
  </text>
  
  <!-- Enhanced tagline -->
  <text x="36" y="34" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#667eea" opacity="0.9">
    PRODUCT REVIEWS
  </text>
  
  <!-- Decorative accent -->
  <circle cx="130" cy="23" r="2" fill="url(#logoGradient)" opacity="0.6"/>
  <circle cx="134" cy="20" r="1.5" fill="url(#logoGradient)" opacity="0.4"/>
  <circle cx="137" cy="26" r="1" fill="url(#logoGradient)" opacity="0.3"/>
</svg>